name: Playwright Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Runs every day at 8:00 AM UTC (4AM Toronto time) — like a real QA team
    - cron: "0 8 * * *"
  workflow_dispatch:
    # Allows manual trigger from GitHub UI

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout code ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ──────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install Python dependencies ───────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Install Playwright browsers ───────────────────────────────
      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      # ── 5. Create reports directory ───────────────────────────────────
      - name: Create reports directory
        run: mkdir -p reports/videos

      # ── 6. Run tests ──────────────────────────────────────────────────
      - name: Run Playwright tests
        id: run_tests
        run: pytest
        continue-on-error: true   # Don't stop — we still want to upload report on failure

      # ── 7. Upload HTML report as artifact ────────────────────────────
      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()              # Upload even if tests failed
        with:
          name: playwright-report-${{ github.run_number }}
          path: reports/
          retention-days: 30

      # ── 8. Post summary to GitHub job summary page ────────────────────
      - name: Write job summary
        if: always()
        run: |
          echo "## 🎭 Playwright Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Run # | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📥 Download the full HTML report from the **Artifacts** section above." >> $GITHUB_STEP_SUMMARY

      # ── 9. Notify on failure via GitHub issue (no Slack needed) ───────
      - name: Notify failure — create GitHub issue
        if: steps.run_tests.outcome == 'failure' && github.event_name != 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `🚨 Test Failure — Run #${{ github.run_number }} on ${{ github.ref_name }}`;
            const body = [
              "## Playwright Tests Failed",
              "",
              `**Branch:** \`${{ github.ref_name }}\``,
              `**Commit:** \`${{ github.sha }}\``,
              `**Triggered by:** ${{ github.event_name }}`,
              `**Run URL:** https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
              "",
              "📥 Download the HTML report from the Artifacts section in the link above.",
              "",
              "> Auto-created by GitHub Actions. Close this issue once the failure is investigated."
            ].join("\n");

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ["bug", "automated-test-failure"]
            });

      # ── 10. Fail the job if tests failed (after artifacts uploaded) ───
      - name: Fail job if tests failed
        if: steps.run_tests.outcome == 'failure'
        run: exit 1
